<div class="tab-page">

  <!-- HEAD -->
  <div class="tab-head">
    <h2>CẬP NHẬT KHÓA HỌC</h2>
  </div>

  <!-- FORM -->
  <div class="form-box">

    <div class="form-group">
      <label>Mã khóa học</label>
      <input type="text" id="ma_khoa">
    </div>

    <div class="form-group">
      <label>Môn học</label>
      <select id="khMonHoc"></select>
    </div>

    <div class="form-group">
      <label>Thời gian học</label>
      <input type="text" id="thoi_gian">
    </div>

    <div class="form-group">
      <label>Dự kiến khai giảng</label>
      <input type="date" id="khai_giang">
    </div>

    <div class="form-group">
      <label>Ảnh khóa học</label>
      <input type="file" id="imageFile" accept="image/*">
      <button type="button" onclick="removeImage()">Xóa ảnh</button>

      <div style="margin-top:10px;text-align:center;">
        <img id="imagePreview"
             style="max-width:200px;max-height:140px;border-radius:6px;">
      </div>
    </div>

    <div class="form-group">
      <label>Mô tả</label>

      <div style="margin-bottom:8px;">
        <button type="button" onclick="insertImageToHtml()">Chèn ảnh</button>
        <button type="button" onclick="insertYoutube()">Clip / Youtube</button>
        <button type="button" onclick="previewCourse()">Preview</button>
      </div>

      <div id="mo_ta_html"
           contenteditable="true"
           style="min-height:180px;border:1px solid #ccc;padding:10px;background:#fff;">
      </div>
    </div>

    <div class="form-actions">
      <button onclick="addCourse()">Thêm</button>
      <button onclick="saveCourse()">Lưu</button>
      <button onclick="deleteCourse()">Xóa</button>
    </div>

  </div>

  <!-- LIST -->
  <div class="list-box">
    <h3>Danh sách khóa học</h3>

    <table border="1" width="100%" cellpadding="6">
      <thead>
        <tr>
          <th>STT</th>
          <th>Mã khóa</th>
          <th>Môn học</th>
          <th>Thời gian</th>
          <th>Khai giảng</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>
