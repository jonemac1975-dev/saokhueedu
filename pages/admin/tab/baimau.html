<h2>CẬP NHẬT BÀI GIẢNG MẪU</h2>

<div class="form-box">
  <label>Tiêu đề:</label>
  <input type="text" id="bmTieuDe">

  <label>Tên bài giảng:</label>
  <select id="bmTen">
    <option value="mau1">Mẫu 1</option>
    <option value="mau2">Mẫu 2</option>
    <option value="mau3">Mẫu 3</option>
    <option value="mau4">Mẫu 4</option>
    <option value="mau5">Mẫu 5</option>
    <option value="mau6">Mẫu 6</option>
  </select>

  <label>Link (YouTube / MP4):</label>
<input type="text" id="bmLink" placeholder="https://...">

<div class="preview-box">
  <iframe id="bmPreviewYT" style="display:none"
    width="100%" height="220"
    frameborder="0"
    allowfullscreen></iframe>

  <video id="bmPreviewMP4" style="display:none"
    width="100%" height="220"
    controls></video>
</div>


  <div class="btn-row">
    <button id="btnThem">Thêm</button>
    <button id="btnLuu" style="display:none">Lưu</button>
    <button id="btnXoa" style="display:none">Xóa</button>
  </div>
</div>

<hr>

<table class="admin-table">
  <thead>
    <tr>
      <th>STT</th>
      <th>Tiêu đề</th>
      <th>Tên bài giảng</th>
      <th>Link</th>
    </tr>
  </thead>
  <tbody id="baimauTable"></tbody>
</table>

<div id="toast" class="toast"></div>
