<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>ĐĂNG KÝ HỌC VIÊN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./css/student.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="card auth-card">

      <div class="page-title">ĐĂNG KÝ HỌC VIÊN</div>

      <!-- MESSAGE -->
      <div id="msg" class="msg"></div>

      <!-- FORM -->
      <div class="form-group">
        <label>Tên đăng nhập</label>
        <input id="username" placeholder="Tên đăng nhập">
      </div>

      <div class="form-group">
        <label>Mật khẩu</label>
        <input id="password" type="password" placeholder="Mật khẩu">
      </div>

      <div class="form-group">
        <label>Nhập lại mật khẩu</label>
        <input id="repass" type="password" placeholder="Nhập lại mật khẩu">
      </div>

      <!-- ACTIONS -->
      <div class="actions">
        <button class="btn-primary" onclick="register()">Đăng ký</button>
        <button class="btn-secondary" onclick="window.location='../../index.html'">Hủy</button>
      </div>

    </div>
  </div>

  <script type="module" src="student-auth.js"></script>
</body>
</html>
