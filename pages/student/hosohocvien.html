<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Hồ sơ học viên</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./css/student.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="card profile-card">

      <div class="page-title">Hồ sơ học viên</div>

      <!-- MESSAGE -->
      <div id="msg" class="msg"></div>

      <!-- AVATAR -->
      <div class="avatar-box">
        <img id="avatarPreview" alt="Avatar">
        <input type="file" id="avatarFile" accept="image/*">
        <div class="avatar-actions">
          <button type="button" class="btn-secondary" onclick="removeAvatar()">Xóa ảnh</button>
        </div>
      </div>

      <!-- FORM -->
      <div class="form-grid">

        <div class="form-group">
          <label>Tên đăng ký</label>
          <input type="text" id="username" readonly>
        </div>

        <div class="form-group">
          <label>Họ và tên</label>
          <input type="text" id="ho_ten">
        </div>

        <div class="form-group">
          <label>Giới tính</label>
          <select id="gioi_tinh">
            <option value="">-- chọn --</option>
            <option value="Nam">Nam</option>
            <option value="Nữ">Nữ</option>
          </select>
        </div>

        <div class="form-group">
          <label>Ngày sinh</label>
          <input type="date" id="ngay_sinh">
        </div>

        <div class="form-group">
          <label>Điện thoại</label>
          <input type="text" id="dien_thoai">
        </div>

        <div class="form-group">
          <label>Gmail</label>
          <input type="text" id="gmail">
        </div>

        <div class="form-group">
          <label>Facebook</label>
          <input type="text" id="facebook">
        </div>

        <div class="form-group">
          <label>Zalo</label>
          <input type="text" id="zalo">
        </div>

        <div class="form-group">
          <label>Trường học</label>
          <input type="text" id="truong_hoc">
        </div>

        <div class="form-group full">
          <label>Môn đăng ký</label>
          <div class="checkbox-group">
            <label><input type="checkbox" value="TiengAnh"> Tiếng Anh</label>
            <label><input type="checkbox" value="NguVan"> Ngữ Văn</label>
            <label><input type="checkbox" value="TuNhien"> Tự nhiên (Toán/Lý/Hóa)</label>
          </div>
        </div>

        <div class="form-group">
          <label>Lớp</label>
          <select id="lop">
            <option value="">-- chọn --</option>
          </select>
        </div>

        <div class="form-group">
          <label>Hình thức đóng phí</label>
          <select id="hinh_thuc_dong_phi">
            <option value="">-- chọn --</option>
            <option value="1_thang">1 tháng</option>
            <option value="3_thang">3 tháng</option>
            <option value="6_thang">6 tháng</option>
          </select>
        </div>

      </div>

      <!-- ACTIONS -->
      <div class="actions">
        <button class="btn-primary" onclick="register()">Đăng ký</button>
        <button class="btn-secondary" onclick="updateProfile()">Cập nhật</button>
        <button class="btn-secondary" onclick="goHome()">Home</button>
<button class="btn-secondary" onclick="gopage()">My page</button>
      </div>

    </div>
  </div>

  <script type="module" src="hosohocvien.js"></script>
</body>
</html>
